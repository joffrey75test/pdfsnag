<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PDFSNAG Users</title>
    <link rel="stylesheet" href="/app/users.css" />
    <link rel="stylesheet" href="/app/shell.css" />
  </head>
  <body class="appShellBody">
    <aside class="appSidebar" aria-label="Navigation">
      <div class="appSidebar__brand">
        <div class="appSidebar__brandText">
          <strong>PDFSNAG</strong>
        </div>
      </div>
      <nav class="appSidebar__nav">
        <a class="appSidebar__link" href="/app/login.html">Projet</a>
        <a class="appSidebar__link" href="/app/ged.html">GED</a>
        <a class="appSidebar__link" href="/app/lists.html">Listes</a>
      </nav>
      <div class="appSidebar__footer">
        <a href="/app/">Ouvrir le viewer</a>
      </div>
    </aside>
    <div id="appSidebarResizer" class="appSidebarResizer" aria-hidden="true"></div>

    <header class="topbar">
      <div class="topbar__left">
        <h1>Gestion Utilisateurs</h1>
      </div>
      <div class="topbar__right">
        <label>
          JWT
          <input id="jwtToken" type="password" placeholder="Bearer token admin" />
        </label>
        <label>
          Company ID
          <input id="companyId" type="text" placeholder="cmp_xxx" />
        </label>
        <button id="connectBtn" class="btn btn--primary" type="button">Connecter</button>
      </div>
    </header>

    <main class="layout">
      <section class="panel">
        <div class="panel__header">
          <h2>Membres</h2>
          <button id="refreshMembersBtn" class="btn" type="button">Rafraichir</button>
        </div>
        <div id="membersList" class="list"></div>
      </section>

      <section class="panel">
        <div class="panel__header">
          <h2>Inviter un membre</h2>
        </div>

        <form id="inviteForm" class="form">
          <label>
            Email
            <input id="inviteEmail" type="email" required placeholder="membre@exemple.com" />
          </label>

          <label>
            Role company
            <select id="inviteRole" required>
              <option value="member">member</option>
              <option value="admin">admin</option>
              <option value="owner">owner</option>
            </select>
          </label>

          <label>
            Expiration (jours)
            <input id="inviteExpiresDays" type="number" min="1" max="30" value="7" />
          </label>

          <button class="btn btn--primary" type="submit">Créer invitation</button>
        </form>

        <div id="inviteResult" class="result"></div>
      </section>
    </main>

    <footer class="footer">
      <span id="status">Prêt.</span>
    </footer>

    <script type="module" src="/app/shell.js"></script>
    <script type="module" src="/app/users.js"></script>
  </body>
</html>
