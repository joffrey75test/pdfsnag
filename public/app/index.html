<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PDF Viewer</title>
    <link rel="stylesheet" href="/pdfjs/web/pdf_viewer.css" />
    <link rel="stylesheet" href="/app/styles.css" />
  </head>
  <body>
    <div class="toolbar">
      <div class="toolbar__left">
        <label class="fileButton">
          <input id="fileInput" type="file" accept="application/pdf" />
          <span>Open PDF</span>
        </label>
        <div class="toolGroup" role="group" aria-label="Outils annotation">
          <button id="toolSelect" type="button" class="btn toolBtn is-active" title="Mode sélection" aria-label="Mode sélection">
            <svg viewBox="0 0 24 24" class="toolIcon" aria-hidden="true">
              <path d="M4 3l7.8 17.2 2.2-6.3 6.3-2.2L4 3z" />
            </svg>
          </button>
          <button id="toolHighlight" type="button" class="btn toolBtn" title="Surlignage" aria-label="Surlignage">
            <svg viewBox="0 0 24 24" class="toolIcon" aria-hidden="true">
              <path d="M4 20h6l9-9-6-6-9 9v6zM11 6l7 7" />
            </svg>
          </button>
          <button id="toolText" type="button" class="btn toolBtn" title="Texte" aria-label="Texte">
            <svg viewBox="0 0 24 24" class="toolIcon" aria-hidden="true">
              <path d="M5 6h14M12 6v12M8 18h8" />
            </svg>
          </button>
          <button id="toolInk" type="button" class="btn toolBtn" title="Dessin" aria-label="Dessin">
            <svg viewBox="0 0 24 24" class="toolIcon" aria-hidden="true">
              <path d="M4 20l4.5-1 9.8-9.8a2.5 2.5 0 0 0 0-3.6l-.9-.9a2.5 2.5 0 0 0-3.6 0L4 14.5 4 20z" />
            </svg>
          </button>
        </div>
        <button
          id="toggleThumbs"
          type="button"
          class="btn"
          aria-label="Afficher ou masquer les vignettes"
          title="Afficher ou masquer les vignettes"
        >▤</button>
      </div>
      <div class="toolbar__right">
        <button id="zoomFit" type="button" class="btn" title="Ajuster à la fenêtre">Fit</button>
        <button id="zoomOut" type="button" class="btn">-</button>
        <span id="zoomValue" class="zoomPill">100%</span>
        <button id="zoomIn" type="button" class="btn">+</button>
        <span id="status" class="statusText"></span>
      </div>
    </div>

    <div id="appLayout">
      <aside id="thumbsSidebar">
        <div id="thumbsContainer"></div>
      </aside>
      <div id="thumbsResizer" aria-hidden="true"></div>
      <div id="viewerContainer">
        <div id="viewer" class="pdfViewer"></div>
      </div>
    </div>

    <script type="module" src="/app/viewer.js"></script>
  </body>
</html>
