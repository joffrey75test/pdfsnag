<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PDF Viewer</title>
    <link rel="stylesheet" href="/pdfjs/web/pdf_viewer.css" />
    <link rel="stylesheet" href="/app/shell.css" />
    <link rel="stylesheet" href="/app/styles.css" />
  </head>
  <body class="appShellBody">
    <aside class="appSidebar" aria-label="Navigation">
      <div class="appSidebar__brand">
        <div class="appSidebar__brandText">
          <strong>PDFSNAG</strong>
        </div>
      </div>
      <nav class="appSidebar__nav">
        <a class="appSidebar__link" href="/app/login.html">Projet</a>
        <a class="appSidebar__link" href="/app/ged.html">GED</a>
        <a class="appSidebar__link" href="/app/lists.html">Listes</a>
        <a class="appSidebar__link is-active" href="/app/">Viewer</a>
      </nav>
      <div class="appSidebar__footer">
        <a href="/app/users.html">Gestion utilisateurs</a>
      </div>
    </aside>
    <div id="appSidebarResizer" class="appSidebarResizer" aria-hidden="true"></div>

    <div class="toolbar">
      <div class="toolbar__left">
        <div class="toolGroup" role="group" aria-label="Outils annotation">
          <button id="toolSelect" type="button" class="btn toolBtn is-active" title="Mode sélection" aria-label="Mode sélection">
            <svg viewBox="0 0 24 24" class="toolIcon" aria-hidden="true">
              <path d="M4 3l7.8 17.2 2.2-6.3 6.3-2.2L4 3z" />
            </svg>
          </button>
          <button id="toolHighlight" type="button" class="btn toolBtn" title="Surlignage" aria-label="Surlignage">
            <svg viewBox="0 0 24 24" class="toolIcon" aria-hidden="true">
              <path d="M4 20h6l9-9-6-6-9 9v6zM11 6l7 7" />
            </svg>
          </button>
          <button id="toolCloud" type="button" class="btn toolBtn" title="Nuage" aria-label="Nuage">
            <svg viewBox="0 0 24 24" class="toolIcon" aria-hidden="true">
              <path d="M7 18h10a4 4 0 0 0 .6-8 5.5 5.5 0 0 0-10.7-.8A3.8 3.8 0 0 0 7 18z" />
            </svg>
          </button>
          <button id="toolText" type="button" class="btn toolBtn" title="Texte" aria-label="Texte">
            <svg viewBox="0 0 24 24" class="toolIcon" aria-hidden="true">
              <path d="M5 6h14M12 6v12M8 18h8" />
            </svg>
          </button>
          <button id="toolInk" type="button" class="btn toolBtn" title="Dessin" aria-label="Dessin">
            <svg viewBox="0 0 24 24" class="toolIcon" aria-hidden="true">
              <path d="M4 20l4.5-1 9.8-9.8a2.5 2.5 0 0 0 0-3.6l-.9-.9a2.5 2.5 0 0 0-3.6 0L4 14.5 4 20z" />
            </svg>
          </button>
        </div>
        <button
          id="toggleThumbs"
          type="button"
          class="btn"
          aria-label="Afficher ou masquer les vignettes"
          title="Afficher ou masquer les vignettes"
        >▤</button>
        <button
          id="toggleComments"
          type="button"
          class="btn"
          aria-label="Afficher ou masquer les commentaires"
          title="Afficher ou masquer les commentaires"
          aria-pressed="true"
        >💬</button>
      </div>
      <div class="toolbar__right">
        <label class="styleCtl" title="Couleur du trait">
          <span>C</span>
          <input id="strokeColor" type="color" value="#ff0000" aria-label="Couleur du trait" />
        </label>
        <label class="styleCtl" title="Epaisseur du trait">
          <span>E</span>
          <input id="strokeWidth" type="number" min="1" max="24" step="1" value="4" aria-label="Epaisseur du trait" />
        </label>
        <label class="styleCtl" title="Style du trait">
          <span>S</span>
          <select id="strokeStyle" aria-label="Style du trait">
            <option value="solid">Solide</option>
            <option value="dashed">Tirets</option>
            <option value="dotted">Points</option>
          </select>
        </label>
        <button id="zoomFit" type="button" class="btn" title="Ajuster à la fenêtre">↗</button>
        <a href="/app/ged.html" class="btn" title="Ouvrir la GED">GED</a>
        <a href="/app/users.html" class="btn" title="Gérer les utilisateurs">Users</a>
        <button id="zoomOut" type="button" class="btn">-</button>
        <span id="zoomValue" class="zoomPill">100%</span>
        <button id="zoomIn" type="button" class="btn">+</button>
        <span id="status" class="statusText"></span>
      </div>
    </div>

    <div id="appLayout">
      <aside id="thumbsSidebar">
        <div id="thumbsContainer"></div>
      </aside>
      <div id="thumbsResizer" aria-hidden="true"></div>
      <div id="viewerContainer">
        <div id="viewer" class="pdfViewer"></div>
      </div>
      <div id="commentResizer" aria-hidden="true"></div>
      <aside id="commentSidebar" aria-label="Commentaires annotation">
        <div class="commentHeader">
          <h3 id="commentTitle">Commentaires</h3>
          <button id="hideCommentSidebar" type="button" class="btn" title="Masquer les commentaires" aria-label="Masquer les commentaires">×</button>
        </div>
        <div id="commentMeta" class="commentMeta">Aucun objet sélectionné</div>
        <textarea id="commentText" class="commentText" readonly placeholder="Sélectionne un objet sur le layer annotation"></textarea>
        <div id="commentThread" class="commentThread"></div>
        <div id="replyTarget" class="replyTarget" hidden></div>
        <textarea id="newCommentText" class="commentText commentEditor" placeholder="Ajouter un commentaire..." disabled></textarea>
        <div class="commentActions">
          <button id="addCommentBtn" type="button" class="btn btn--text" disabled>Ajouter</button>
          <button id="cancelReplyBtn" type="button" class="btn btn--text" hidden>Annuler réponse</button>
        </div>
        <button id="deleteSelectedAnnotation" type="button" class="btn btn--text commentDeleteBtn" disabled>Supprimer l'objet</button>
      </aside>
    </div>

    <script type="module" src="/app/shell.js"></script>
    <script type="module" src="/app/viewer.js"></script>
  </body>
</html>
